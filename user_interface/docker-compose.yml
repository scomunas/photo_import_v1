version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: photo_import_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./back
    container_name: photo_import_back
    restart: always
    depends_on:
      - db
    env_file:
      - ./.env
    environment:
      - NAS_SERVER_URL=${NAS_SERVER_URL:-http://192.168.68.113:9090}
    ports:
      - "8080:8080"

  frontend:
    build: ./front
    container_name: photo_import_front
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
