<div class="page-header">
  <div class="header-main">
    <h1>Dashboard</h1>
    <p class="subtitle">Monitor import performance at a glance.</p>
  </div>
  
  <div class="header-filters">
    <span class="filter-label">Date Range</span>
    <div class="inputs">
      <input type="date" [(ngModel)]="startDate" (change)="onFilterChange()" class="date-input">
      <span class="separator">to</span>
      <input type="date" [(ngModel)]="endDate" (change)="onFilterChange()" class="date-input">
    </div>
  </div>
</div>

<!-- KPI CARDS -->
<div class="kpi-grid">
  <div class="kpi-card shadow">
    <div class="kpi-icon blue">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
    </div>
    <div class="kpi-info">
      <span class="kpi-label">Received</span>
      <h2 class="kpi-value">{{ kpis.received }}</h2>
    </div>
  </div>

  <div class="kpi-card shadow">
    <div class="kpi-icon green">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="kpi-info">
      <span class="kpi-label">Processed</span>
      <h2 class="kpi-value">{{ kpis.completed }}</h2>
    </div>
  </div>

  <div class="kpi-card shadow">
    <div class="kpi-icon yellow">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    </div>
    <div class="kpi-info">
      <span class="kpi-label">Pending</span>
      <h2 class="kpi-value">{{ kpis.pending }}</h2>
    </div>
  </div>

  <div class="kpi-card shadow">
    <div class="kpi-icon red">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
    </div>
    <div class="kpi-info">
      <span class="kpi-label">Errors</span>
      <h2 class="kpi-value">{{ kpis.error }}</h2>
    </div>
  </div>
</div>

<!-- CHART CARD -->
<div class="chart-container shadow">
  <h3>Daily Distribution</h3>
  <div class="chart-wrapper">
    <canvas #statsChart></canvas>
  </div>
</div>
